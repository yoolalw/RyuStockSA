<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/register.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <title>Ryu</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RYŪ</h1>
            <p>Cadastre seu produto</p>
        </div>

        <div class="banner">
            <figure>
                <img src="https://www.shutterstock.com/shutterstock/photos/2039224847/display_1500/stock-vector-japan-tourism-horizontal-web-banner-template-japan-s-pine-tree-with-mount-fuji-background-2039224847.jpg" alt="japanese banner"/>
            </figure>
        </div>

        <div class="registerForm">
            <form id="registerForm">
                <div class="boxInput">
                <label for="nome">Nome do produto</label>
                <input type="text"
                        id="nome"
                        name="nome"
                        placeholder="Insira o nome do seu produto aqui!"
                        required
                        />
                </div>
                
                <div class="boxInput">
                <label for="quantidade">Quantidade disponivel</label>
                <input type="number"
                        id="quantidade"
                        name="quantidade"
                        placeholder="Insira a quantidade disponivel"
                        required
                        />
                </div>

                <div class="boxInput">
                <label for="preco">Preço unitario</label>
                <input type="number"
                        id="preco"
                        name="preco"
                        placeholder="Insira o preco do seu produto"
                        required
                        />
                </div>
                <input type="submit" name="btnEnviar" id="btnEnviar" class="btnEnviar">
            </form>
            
        </div>

    </div>
</body>
</html>
